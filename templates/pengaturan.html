{% extends "layout.html" %}
{% block title %}Pengaturan - PGC{% endblock %}
{% block content %}
<h3 class="text-lg font-semibold text-gray-800 mb-4"><i class="fas fa-cog text-primary-500 mr-2"></i>Pengaturan</h3>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    <a href="{{ url_for('iuran_kategori_list', tahun=tahun) }}" class="bg-white rounded-xl shadow p-5 hover:shadow-md transition flex items-center space-x-4">
        <div class="w-12 h-12 bg-primary-100 rounded-lg flex items-center justify-center text-primary-600">
            <i class="fas fa-tags text-xl"></i>
        </div>
        <div>
            <h4 class="font-semibold text-gray-800">Kategori Iuran</h4>
            <p class="text-xs text-gray-500">Atur rincian iuran per tahun</p>
        </div>
    </a>
</div>

<div class="mt-6">
    <h4 class="font-semibold text-gray-800 mb-3"><i class="fas fa-database text-primary-500 mr-2"></i>Backup & Restore</h4>
    <div class="bg-white rounded-xl shadow p-5">
        <div class="flex flex-wrap gap-4 items-center">
            <a href="{{ url_for('pengaturan_export') }}" class="inline-flex items-center px-4 py-2 bg-primary-500 text-white rounded-lg hover:bg-primary-600 transition text-sm">
                <i class="fas fa-download mr-2"></i>Export JSON
            </a>
            <form method="POST" action="{{ url_for('pengaturan_import') }}" enctype="multipart/form-data" class="flex flex-wrap items-center gap-3">
                <input type="file" name="file" accept=".json" required class="text-sm border border-gray-300 rounded px-3 py-2">
                <button type="submit" class="inline-flex items-center px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition text-sm" onclick="return confirm('Yakin restore? Semua data saat ini akan diganti dengan data dari file backup.')">
                    <i class="fas fa-upload mr-2"></i>Restore JSON
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
