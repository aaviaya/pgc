{% extends "layout.html" %}
{% block title %}{% if warga %}Edit Warga{% else %}Tambah Warga{% endif %} - PGC{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-xl shadow">
    <div class="px-5 py-4 border-b border-gray-100">
        <h3 class="font-semibold text-gray-800">
            <i class="fas {% if warga %}fa-edit{% else %}fa-plus{% endif %} text-primary-500 mr-2"></i>
            {% if warga %}Edit Warga{% else %}Tambah Warga Baru{% endif %}
        </h3>
    </div>
    <form method="POST" class="p-5 space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Blok</label>
            <select name="blok" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-400">
                {% for b in blok_list %}
                <option value="{{ b }}" {% if warga and warga.blok == b %}selected{% endif %}>{{ b }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">No Rumah</label>
            <input type="text" name="no_rumah" value="{{ warga.no_rumah if warga else '' }}" required
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-400">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nama</label>
            <input type="text" name="nama" value="{{ warga.nama if warga else '' }}"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-400">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
            <select name="status" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-400">
                <option value="Huni" {% if warga and warga.status == 'Huni' %}selected{% endif %}>Huni</option>
                <option value="Belum Huni" {% if warga and warga.status == 'Belum Huni' %}selected{% endif %}>Belum Huni</option>
            </select>
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="bg-primary-500 hover:bg-primary-600 text-white px-6 py-2 rounded-lg text-sm transition flex-1"><i class="fas fa-save mr-1"></i>Simpan</button>
            <a href="{{ url_for('warga_list', tahun=tahun) }}" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-6 py-2 rounded-lg text-sm transition"><i class="fas fa-times mr-1"></i>Batal</a>
        </div>
    </form>
</div>
{% endblock %}
