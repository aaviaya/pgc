{% extends "layout.html" %}
{% block title %}Pengaturan - PGC{% endblock %}
{% block content %}
<h3 class="text-lg font-semibold text-gray-800 mb-4"><i class="fas fa-cog text-primary-500 mr-2"></i>Pengaturan</h3>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    <a href="{{ url_for('iuran_kategori_list', tahun=tahun) }}" class="bg-white rounded-xl shadow p-5 hover:shadow-md transition flex items-center space-x-4">
        <div class="w-12 h-12 bg-primary-100 rounded-lg flex items-center justify-center text-primary-600">
            <i class="fas fa-tags text-xl"></i>
        </div>
        <div>
            <h4 class="font-semibold text-gray-800">Kategori Iuran</h4>
            <p class="text-xs text-gray-500">Atur rincian iuran per tahun</p>
        </div>
    </a>
    <div class="bg-white rounded-xl shadow p-5 hover:shadow-md transition flex items-center space-x-4 cursor-pointer" onclick="document.getElementById('export-link').click()">
        <div class="w-12 h-12 bg-primary-100 rounded-lg flex items-center justify-center text-primary-600">
            <i class="fas fa-download text-xl"></i>
        </div>
        <div>
            <h4 class="font-semibold text-gray-800">Backup Data</h4>
            <p class="text-xs text-gray-500">Download database sebagai file JSON</p>
            <a id="export-link" href="{{ url_for('pengaturan_export') }}" class="hidden"></a>
        </div>
    </div>
    <div class="bg-white rounded-xl shadow p-5 hover:shadow-md transition flex items-center space-x-4 cursor-pointer" onclick="document.getElementById('file-input').click()">
        <div class="w-12 h-12 bg-primary-100 rounded-lg flex items-center justify-center text-primary-600">
            <i class="fas fa-upload text-xl"></i>
        </div>
        <div>
            <h4 class="font-semibold text-gray-800">Restore Data</h4>
            <p class="text-xs text-gray-500">Pulihkan data dari file backup</p>
            <form id="restore-form" method="POST" action="{{ url_for('pengaturan_import') }}" enctype="multipart/form-data" class="hidden">
                <input id="file-input" type="file" name="file" accept=".json" required onchange="if(this.files.length && confirm('Yakin restore? Semua data saat ini akan diganti dengan data dari file backup.')) this.form.submit()">
            </form>
        </div>
    </div>
</div>
{% endblock %}
